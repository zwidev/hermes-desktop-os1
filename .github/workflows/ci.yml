name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build app bundle
        run: HERMES_MAC_ARCHS=arm64 ./scripts/build-macos-app.sh

