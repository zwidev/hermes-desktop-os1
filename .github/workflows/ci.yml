name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Install Python test dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install PyYAML
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Test
        run: swift test

      - name: Build app bundle
        run: HERMES_MAC_ARCHS=arm64 ./scripts/build-macos-app.sh
